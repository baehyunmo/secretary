<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 임원 관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #2d3436, #636e72);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .left h1 { font-size: 1.5rem; font-weight: 700; }
    header .left .sub { font-size: 0.85rem; opacity: 0.8; margin-top: 0.2rem; }
    header .right a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1.2rem;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    header .right a:hover { background: rgba(255,255,255,0.15); border-color: white; }

    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.15rem;
      margin-bottom: 1rem;
      color: #333;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #f0f0f0;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: #667eea; }
    .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 0.3rem; }

    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 150px;
    }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #666;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.55rem 0.8rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #667eea;
    }

    .btn {
      padding: 0.6rem 1.4rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #5a6fd6; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    .btn-outline {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-outline:hover { background: #f0f3ff; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
    .btn-warn { background: #f39c12; }
    .btn-warn:hover { background: #e67e22; }

    /* 임원 테이블 */
    .exec-table {
      width: 100%;
      border-collapse: collapse;
    }
    .exec-table th {
      text-align: left;
      padding: 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      border-bottom: 2px solid #f0f0f0;
      white-space: nowrap;
    }
    .exec-table td {
      padding: 0.75rem;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.9rem;
      vertical-align: middle;
    }
    .exec-table tr:hover { background: #fafbff; }
    .exec-table tr:last-child td { border-bottom: none; }

    .position-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pos-chairman { background: #ffeaa7; color: #856404; }
    .pos-ceo { background: #dfe6e9; color: #2d3436; }
    .pos-executive { background: #e3f2fd; color: #1565c0; }
    .pos-director { background: #e8f5e9; color: #2e7d32; }
    .pos-other { background: #f0f0f0; color: #666; }

    .profile-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .name-cell {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .name-cell .name { font-weight: 600; }
    .name-cell .dept { font-size: 0.78rem; color: #999; }

    .actions { display: flex; gap: 0.3rem; }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .search-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: #667eea; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      width: 90%;
      max-width: 550px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 1rem; font-size: 1.15rem; }
    .modal .form-group { margin-bottom: 0.6rem; }

    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 2rem 0;
      font-size: 0.9rem;
    }

    /* 활동 로그 */
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .log-item:last-child { border-bottom: none; }
    .log-time {
      font-size: 0.75rem;
      color: #aaa;
      white-space: nowrap;
      min-width: 70px;
      padding-top: 0.1rem;
    }
    .log-text { font-size: 0.85rem; color: #555; }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 0.75rem; text-align: center; }
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
      .exec-table { font-size: 0.8rem; }
      .exec-table th, .exec-table td { padding: 0.5rem 0.3rem; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <h1>관리자 페이지</h1>
    <div class="sub">임원 등록 및 관리</div>
  </div>
  <div class="right">
    <a href="index.html">메인으로 돌아가기</a>
  </div>
</header>

<div class="container">
  <!-- 통계 -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">전체 임원</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statSchedules">0</div>
      <div class="label">예정 일정</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statTrips">0</div>
      <div class="label">예정 출장</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statThisMonth">0</div>
      <div class="label">이번 달 일정</div>
    </div>
  </div>

  <!-- 임원 등록 -->
  <div class="card">
    <h2>새 임원 등록</h2>
    <div class="form-row">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="addName" placeholder="예: 홍길동">
      </div>
      <div class="form-group">
        <label>직위</label>
        <select id="addPosition">
          <option value="회장">회장</option>
          <option value="부회장">부회장</option>
          <option value="대표이사">대표이사</option>
          <option value="사장">사장</option>
          <option value="부사장">부사장</option>
          <option value="전무">전무</option>
          <option value="상무">상무</option>
          <option value="이사">이사</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>부서</label>
        <input type="text" id="addDept" placeholder="예: 경영기획실">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>연락처</label>
        <input type="tel" id="addPhone" placeholder="010-0000-0000">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="addEmail" placeholder="example@company.com">
      </div>
      <div class="form-group">
        <label>비고</label>
        <input type="text" id="addNote" placeholder="특이사항, 선호사항 등">
      </div>
    </div>
    <div style="margin-top:0.5rem;">
      <button class="btn" onclick="addExecutive()">임원 등록</button>
    </div>
  </div>

  <!-- 임원 목록 -->
  <div class="card">
    <h2>임원 목록</h2>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="이름, 직위, 부서로 검색..." oninput="renderTable()">
      <select id="filterPosition" onchange="renderTable()" style="padding:0.6rem 0.8rem; border:2px solid #e0e0e0; border-radius:10px; font-size:0.9rem;">
        <option value="all">전체 직위</option>
        <option value="회장">회장</option>
        <option value="부회장">부회장</option>
        <option value="대표이사">대표이사</option>
        <option value="사장">사장</option>
        <option value="부사장">부사장</option>
        <option value="전무">전무</option>
        <option value="상무">상무</option>
        <option value="이사">이사</option>
      </select>
    </div>
    <div style="overflow-x:auto;">
      <table class="exec-table">
        <thead>
          <tr>
            <th>임원</th>
            <th>직위</th>
            <th>부서</th>
            <th>연락처</th>
            <th>이메일</th>
            <th>예정 일정</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="execTableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">등록된 임원이 없습니다.</div>
  </div>

  <!-- 최근 활동 로그 -->
  <div class="card">
    <h2>최근 활동 기록</h2>
    <div id="activityLog"></div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>임원 정보 수정</h3>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="editName">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>직위</label>
        <select id="editPosition">
          <option value="회장">회장</option>
          <option value="부회장">부회장</option>
          <option value="대표이사">대표이사</option>
          <option value="사장">사장</option>
          <option value="부사장">부사장</option>
          <option value="전무">전무</option>
          <option value="상무">상무</option>
          <option value="이사">이사</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>부서</label>
        <input type="text" id="editDept">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>연락처</label>
        <input type="tel" id="editPhone">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="editEmail">
      </div>
    </div>
    <div class="form-group">
      <label>비고</label>
      <textarea id="editNote" rows="3" placeholder="특이사항, 선호사항 등"></textarea>
    </div>
    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
      <button class="btn" onclick="saveEdit()">저장</button>
      <button class="btn btn-outline" onclick="closeEditModal()">취소</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3 id="detailTitle">임원 상세 정보</h3>
    <div id="detailContent"></div>
    <div style="margin-top:1rem;">
      <button class="btn btn-outline" onclick="closeDetailModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ========== 데이터 ==========
const POSITION_ORDER = ['회장','부회장','대표이사','사장','부사장','전무','상무','이사','기타'];
const COLORS = ['#667eea','#764ba2','#e74c3c','#27ae60','#f39c12','#3498db','#e67e22','#9b59b6','#1abc9c','#34495e'];

// 기존 executives 배열을 상세 객체 배열로 마이그레이션
let executives = JSON.parse(localStorage.getItem('sec_exec_details') || 'null');
if (!executives) {
  const oldExecs = JSON.parse(localStorage.getItem('sec_executives') || '[]');
  executives = oldExecs.map((name, i) => {
    if (typeof name === 'string') {
      return {
        id: Date.now() + i,
        name: name,
        position: guessPosition(name),
        dept: '',
        phone: '',
        email: '',
        note: '',
        createdAt: new Date().toISOString()
      };
    }
    return name;
  });
  saveExecutives();
}

let activityLog = JSON.parse(localStorage.getItem('sec_activity_log') || '[]');

function guessPosition(name) {
  if (name.includes('회장')) return '회장';
  if (name.includes('대표')) return '대표이사';
  if (name.includes('사장')) return '사장';
  if (name.includes('전무')) return '전무';
  if (name.includes('상무')) return '상무';
  if (name.includes('이사')) return '이사';
  return '기타';
}

function saveExecutives() {
  localStorage.setItem('sec_exec_details', JSON.stringify(executives));
  // 메인 페이지 호환: 이름 배열도 동기화
  const names = executives.map(e => e.name);
  localStorage.setItem('sec_executives', JSON.stringify(names));
}

function addLog(msg) {
  activityLog.unshift({
    time: new Date().toISOString(),
    text: msg
  });
  if (activityLog.length > 50) activityLog = activityLog.slice(0, 50);
  localStorage.setItem('sec_activity_log', JSON.stringify(activityLog));
}

function getPositionClass(pos) {
  if (pos === '회장' || pos === '부회장') return 'pos-chairman';
  if (pos === '대표이사' || pos === '사장') return 'pos-ceo';
  if (pos === '부사장' || pos === '전무') return 'pos-executive';
  if (pos === '상무' || pos === '이사') return 'pos-director';
  return 'pos-other';
}

function getColor(idx) { return COLORS[idx % COLORS.length]; }

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ========== 임원 등록 ==========
function addExecutive() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('이름을 입력해 주세요.'); return; }
  if (executives.some(e => e.name === name)) { alert('이미 등록된 임원입니다.'); return; }

  const exec = {
    id: Date.now(),
    name,
    position: document.getElementById('addPosition').value,
    dept: document.getElementById('addDept').value.trim(),
    phone: document.getElementById('addPhone').value.trim(),
    email: document.getElementById('addEmail').value.trim(),
    note: document.getElementById('addNote').value.trim(),
    createdAt: new Date().toISOString()
  };

  executives.push(exec);
  saveExecutives();
  addLog(`${exec.position} ${exec.name}님을 등록했습니다.`);

  // 입력 초기화
  ['addName','addDept','addPhone','addEmail','addNote'].forEach(id => document.getElementById(id).value = '');

  renderAll();
}

document.getElementById('addName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addExecutive();
});

// ========== 임원 삭제 ==========
function deleteExecutive(id) {
  const exec = executives.find(e => e.id === id);
  if (!exec) return;
  if (!confirm(`"${exec.position} ${exec.name}"님을 삭제하시겠습니까?\n\n관련 일정 데이터는 유지됩니다.`)) return;

  addLog(`${exec.position} ${exec.name}님을 삭제했습니다.`);
  executives = executives.filter(e => e.id !== id);
  saveExecutives();
  renderAll();
}

// ========== 수정 모달 ==========
function openEditModal(id) {
  const exec = executives.find(e => e.id === id);
  if (!exec) return;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = exec.name;
  document.getElementById('editPosition').value = exec.position;
  document.getElementById('editDept').value = exec.dept || '';
  document.getElementById('editPhone').value = exec.phone || '';
  document.getElementById('editEmail').value = exec.email || '';
  document.getElementById('editNote').value = exec.note || '';
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

function saveEdit() {
  const id = Number(document.getElementById('editId').value);
  const idx = executives.findIndex(e => e.id === id);
  if (idx < 0) return;

  const oldName = executives[idx].name;
  const newName = document.getElementById('editName').value.trim();
  if (!newName) { alert('이름을 입력해 주세요.'); return; }

  executives[idx].name = newName;
  executives[idx].position = document.getElementById('editPosition').value;
  executives[idx].dept = document.getElementById('editDept').value.trim();
  executives[idx].phone = document.getElementById('editPhone').value.trim();
  executives[idx].email = document.getElementById('editEmail').value.trim();
  executives[idx].note = document.getElementById('editNote').value.trim();

  saveExecutives();

  // 이름 변경 시 기존 일정도 업데이트
  if (oldName !== newName) {
    let schedules = JSON.parse(localStorage.getItem('sec_schedules') || '[]');
    schedules.forEach(s => { if (s.exec === oldName) s.exec = newName; });
    localStorage.setItem('sec_schedules', JSON.stringify(schedules));

    let trips = JSON.parse(localStorage.getItem('sec_trips') || '[]');
    trips.forEach(t => { if (t.exec === oldName) t.exec = newName; });
    localStorage.setItem('sec_trips', JSON.stringify(trips));
  }

  addLog(`${executives[idx].position} ${newName}님의 정보를 수정했습니다.`);
  closeEditModal();
  renderAll();
}

// ========== 상세 모달 ==========
function openDetail(id) {
  const exec = executives.find(e => e.id === id);
  if (!exec) return;

  const schedules = JSON.parse(localStorage.getItem('sec_schedules') || '[]');
  const trips = JSON.parse(localStorage.getItem('sec_trips') || '[]');
  const today = new Date().toISOString().slice(0, 10);

  const execSchedules = schedules.filter(s => s.exec === exec.name && s.date >= today)
    .sort((a,b) => a.date.localeCompare(b.date));
  const execTrips = trips.filter(t => t.exec === exec.name && t.date >= today)
    .sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('detailTitle').textContent = `${exec.position} ${exec.name}`;

  let html = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1rem;">
      <div><strong>직위:</strong> ${esc(exec.position)}</div>
      <div><strong>부서:</strong> ${esc(exec.dept) || '-'}</div>
      <div><strong>연락처:</strong> ${esc(exec.phone) || '-'}</div>
      <div><strong>이메일:</strong> ${esc(exec.email) || '-'}</div>
    </div>
    ${exec.note ? `<div style="margin-bottom:1rem;"><strong>비고:</strong> ${esc(exec.note)}</div>` : ''}
    <div style="margin-bottom:0.5rem;"><strong>등록일:</strong> ${new Date(exec.createdAt).toLocaleDateString('ko-KR')}</div>
    <hr style="border:none; border-top:1px solid #eee; margin:1rem 0;">
    <h4 style="margin-bottom:0.5rem;">예정 일정 (${execSchedules.length}건)</h4>
  `;

  if (execSchedules.length === 0) {
    html += '<div style="color:#bbb; font-size:0.85rem; padding:0.5rem 0;">예정된 일정이 없습니다.</div>';
  } else {
    html += execSchedules.slice(0, 10).map(s => `
      <div style="padding:0.4rem 0; border-bottom:1px solid #f5f5f5; font-size:0.88rem;">
        <strong>${s.date}</strong> ${s.time || '종일'} - ${esc(s.title)}
        ${s.location ? `<span style="color:#888;"> (${esc(s.location)})</span>` : ''}
      </div>
    `).join('');
    if (execSchedules.length > 10) html += `<div style="color:#888; font-size:0.8rem; padding:0.3rem 0;">... 외 ${execSchedules.length - 10}건</div>`;
  }

  html += `<h4 style="margin:1rem 0 0.5rem;">예정 출장 (${execTrips.length}건)</h4>`;
  if (execTrips.length === 0) {
    html += '<div style="color:#bbb; font-size:0.85rem; padding:0.5rem 0;">예정된 출장이 없습니다.</div>';
  } else {
    html += execTrips.map(t => `
      <div style="padding:0.4rem 0; border-bottom:1px solid #f5f5f5; font-size:0.88rem;">
        <strong>${t.date}~${t.returnDate || '미정'}</strong> ${esc(t.fromName)} &#8594; ${esc(t.toName)}
        <div style="color:#888; font-size:0.8rem;">노선: ${esc(t.route)} | 호텔: ${esc(t.hotel)}</div>
      </div>
    `).join('');
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('show');
}

// ========== 테이블 렌더링 ==========
function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const posFilter = document.getElementById('filterPosition').value;
  const tbody = document.getElementById('execTableBody');

  const schedules = JSON.parse(localStorage.getItem('sec_schedules') || '[]');
  const today = new Date().toISOString().slice(0, 10);

  let filtered = executives
    .filter(e => {
      if (posFilter !== 'all' && e.position !== posFilter) return false;
      if (search) {
        const haystack = `${e.name} ${e.position} ${e.dept} ${e.phone} ${e.email}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    })
    .sort((a, b) => {
      const ai = POSITION_ORDER.indexOf(a.position);
      const bi = POSITION_ORDER.indexOf(b.position);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  tbody.innerHTML = filtered.map((e, i) => {
    const initial = e.name.charAt(e.name.length - 2) || e.name.charAt(0);
    const schedCount = schedules.filter(s => s.exec === e.name && s.date >= today).length;

    return `
      <tr>
        <td>
          <div class="name-cell">
            <div class="profile-circle" style="background:${getColor(i)}">${esc(initial)}</div>
            <div>
              <div class="name">${esc(e.name)}</div>
              <div class="dept">${esc(e.dept) || '-'}</div>
            </div>
          </div>
        </td>
        <td><span class="position-badge ${getPositionClass(e.position)}">${esc(e.position)}</span></td>
        <td>${esc(e.dept) || '-'}</td>
        <td>${esc(e.phone) || '-'}</td>
        <td>${esc(e.email) || '-'}</td>
        <td style="text-align:center;">${schedCount}건</td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-outline" onclick="openDetail(${e.id})">상세</button>
            <button class="btn btn-sm btn-warn" onclick="openEditModal(${e.id})">수정</button>
            <button class="btn btn-sm btn-danger" onclick="deleteExecutive(${e.id})">삭제</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

// ========== 통계 ==========
function renderStats() {
  const schedules = JSON.parse(localStorage.getItem('sec_schedules') || '[]');
  const trips = JSON.parse(localStorage.getItem('sec_trips') || '[]');
  const today = new Date().toISOString().slice(0, 10);
  const thisMonth = today.slice(0, 7);

  document.getElementById('statTotal').textContent = executives.length;
  document.getElementById('statSchedules').textContent = schedules.filter(s => s.date >= today).length;
  document.getElementById('statTrips').textContent = trips.filter(t => t.date >= today).length;
  document.getElementById('statThisMonth').textContent = schedules.filter(s => s.date.startsWith(thisMonth)).length;
}

// ========== 활동 로그 ==========
function renderLog() {
  const el = document.getElementById('activityLog');
  if (activityLog.length === 0) {
    el.innerHTML = '<div class="empty-state">활동 기록이 없습니다.</div>';
    return;
  }
  el.innerHTML = activityLog.slice(0, 20).map(log => {
    const d = new Date(log.time);
    const timeStr = `${(d.getMonth()+1)}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="log-item">
        <div class="log-time">${timeStr}</div>
        <div class="log-text">${esc(log.text)}</div>
      </div>
    `;
  }).join('');
}

// ========== 전체 렌더링 ==========
function renderAll() {
  renderTable();
  renderStats();
  renderLog();
}

renderAll();
</script>
