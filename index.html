<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비서 - 임원 일정 관리</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .left h1 { font-size: 1.5rem; font-weight: 700; }
    header .left .sub { font-size: 0.85rem; opacity: 0.8; margin-top: 0.2rem; }
    header .right { text-align: right; display: flex; align-items: center; gap: 1.5rem; }
    .admin-link {
      color: white;
      text-decoration: none;
      padding: 0.4rem 1rem;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .admin-link:hover { background: rgba(255,255,255,0.15); border-color: white; }
    .clock-wrap { text-align: right; }
    #clock { font-size: 1.8rem; font-weight: 300; }
    #date { font-size: 0.85rem; opacity: 0.8; }
    .tab-bar {
      background: white;
      display: flex;
      border-bottom: 2px solid #e8e8e8;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 1rem;
      text-align: center;
      background: none;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #667eea; background: #f8f9ff; }
    .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.15rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #333;
    }
    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 150px;
    }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #666;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.55rem 0.8rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #667eea;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #5a6fd6; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219a52; }
    .btn-outline {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-outline:hover { background: #f0f3ff; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
    .exec-chips {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .exec-chip {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 2px solid #667eea;
      background: #667eea;
      color: white;
      transition: all 0.2s;
    }
    .exec-chip .remove {
      margin-left: 0.4rem;
      font-weight: bold;
      opacity: 0.6;
    }
    .exec-chip .remove:hover { opacity: 1; }
    .schedule-list { list-style: none; }
    .schedule-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-date-badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 12px;
      padding: 0.5rem 0.7rem;
      text-align: center;
      min-width: 60px;
      flex-shrink: 0;
    }
    .schedule-date-badge .day { font-size: 1.3rem; font-weight: 700; }
    .schedule-date-badge .month { font-size: 0.7rem; opacity: 0.9; }
    .schedule-info { flex: 1; }
    .schedule-info .title { font-weight: 600; font-size: 0.95rem; }
    .schedule-info .time { color: #667eea; font-size: 0.85rem; margin-top: 0.2rem; }
    .schedule-info .detail { color: #888; font-size: 0.85rem; margin-top: 0.2rem; }
    .schedule-info .exec-tag {
      display: inline-block;
      background: #f0f3ff;
      color: #667eea;
      padding: 0.15rem 0.6rem;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 0.3rem;
    }
    .schedule-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .calendar-nav .month-title { font-size: 1.1rem; font-weight: 600; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
    }
    .calendar-grid .day-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: #999;
      padding: 0.5rem 0;
    }
    .calendar-grid .day-cell {
      padding: 0.4rem;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      min-height: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.15s;
    }
    .calendar-grid .day-cell:hover { background: #f0f3ff; }
    .calendar-grid .day-cell.today { background: #667eea; color: white; font-weight: 700; }
    .calendar-grid .day-cell.has-event::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #e74c3c;
      border-radius: 50%;
      margin-top: 2px;
    }
    .calendar-grid .day-cell.today.has-event::after { background: white; }
    .calendar-grid .day-cell.other-month { color: #ccc; }
    .trip-section { margin-top: 1rem; }
    .trip-section h3 {
      font-size: 1rem;
      color: #444;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #f0f0f0;
    }
    .route-card {
      background: #f8f9ff;
      border: 2px solid #e8ecff;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .route-card:hover { border-color: #667eea; }
    .route-card.selected { border-color: #667eea; background: #eef1ff; }
    .route-card .route-title { font-weight: 600; font-size: 0.95rem; }
    .route-card .route-detail { color: #666; font-size: 0.85rem; margin-top: 0.3rem; }
    .route-card .route-tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 0.4rem;
      margin-right: 0.3rem;
    }
    .tag-recommend { background: #e8f5e9; color: #2e7d32; }
    .tag-fastest { background: #fff3e0; color: #e65100; }
    .tag-cheapest { background: #e3f2fd; color: #1565c0; }
    .hotel-card {
      background: #f8f9ff;
      border: 2px solid #e8ecff;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .hotel-card:hover { border-color: #667eea; }
    .hotel-card.selected { border-color: #667eea; background: #eef1ff; }
    .hotel-card .hotel-name { font-weight: 600; font-size: 0.95rem; }
    .hotel-card .hotel-info { color: #666; font-size: 0.85rem; margin-top: 0.3rem; }
    .hotel-card .stars { color: #f39c12; margin-top: 0.2rem; }
    #map { height: 400px; border-radius: 12px; margin-top: 1rem; }
    .route-summary {
      background: #f0f3ff;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .route-summary h4 { font-size: 0.95rem; margin-bottom: 0.5rem; color: #333; }
    .route-step {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }
    .step-num {
      width: 24px;
      height: 24px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-text { font-size: 0.88rem; color: #444; }
    .step-text strong { color: #222; }
    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 2rem 0;
      font-size: 0.9rem;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 1rem; }
    .modal .form-group { margin-bottom: 0.5rem; }
    @media (max-width: 600px) {
      header { flex-direction: column; text-align: center; }
      .form-row { flex-direction: column; }
      .form-group { min-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <h1>My Secretary</h1>
    <div class="sub">임원 일정 관리 대시보드</div>
  </div>
  <div class="right">
    <a href="admin.html" class="admin-link">관리자 페이지</a>
    <div class="clock-wrap">
      <div id="clock"></div>
      <div id="date"></div>
    </div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="dashboard">대시보드</button>
  <button class="tab-btn" data-tab="schedule">일정 관리</button>
  <button class="tab-btn" data-tab="trip">출장 플래너</button>
</div>

<!-- ===== 대시보드 ===== -->
<div id="tab-dashboard" class="tab-content active">
  <div class="container">
    <div id="greeting" class="card" style="text-align:center; font-size:1.1rem; color:#555;"></div>

    <div class="card">
      <h2>오늘의 일정</h2>
      <ul class="schedule-list" id="todaySchedule"></ul>
    </div>

    <div class="card">
      <h2>예정된 출장</h2>
      <ul class="schedule-list" id="upcomingTrips"></ul>
    </div>

    <div class="card">
      <h2>메모</h2>
      <div>
        <div class="form-group">
          <textarea id="memo" rows="4" placeholder="메모를 입력하세요..." style="width:100%;"></textarea>
        </div>
        <div style="display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem;">
          <button class="btn" onclick="saveMemo()">저장</button>
          <span id="saveStatus" style="font-size:0.8rem; color:#aaa;"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 일정 관리 ===== -->
<div id="tab-schedule" class="tab-content">
  <div class="container">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
        <h2 style="margin-bottom:0;">담당 임원</h2>
        <a href="admin.html" class="btn btn-sm" style="text-decoration:none;">관리자 페이지에서 관리</a>
      </div>
      <div class="exec-chips" id="execChips"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2 style="margin-bottom:0;">캘린더</h2>
        <button class="btn btn-sm" onclick="openScheduleModal()">+ 새 일정</button>
      </div>
      <div class="calendar-nav">
        <button class="btn btn-sm btn-outline" onclick="changeMonth(-1)">&lt; 이전</button>
        <span class="month-title" id="calendarTitle"></span>
        <button class="btn btn-sm btn-outline" onclick="changeMonth(1)">다음 &gt;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
      <h2 id="scheduleListTitle">전체 일정</h2>
      <div style="margin-bottom:1rem;">
        <select id="filterExec" onchange="renderScheduleList()" style="padding:0.4rem 0.8rem; border:2px solid #e0e0e0; border-radius:10px; font-size:0.85rem;">
          <option value="all">전체 임원</option>
        </select>
      </div>
      <ul class="schedule-list" id="scheduleList"></ul>
    </div>
  </div>
</div>

<!-- ===== 출장 플래너 ===== -->
<div id="tab-trip" class="tab-content">
  <div class="container">
    <div class="card">
      <h2>해외 출장 플래너</h2>
      <div class="form-row">
        <div class="form-group">
          <label>임원</label>
          <select id="tripExec"></select>
        </div>
        <div class="form-group">
          <label>출발 도시</label>
          <select id="tripFrom">
            <option value="ICN">서울 (인천 - ICN)</option>
            <option value="GMP">서울 (김포 - GMP)</option>
            <option value="PUS">부산 (김해 - PUS)</option>
            <option value="CJU">제주 (CJU)</option>
          </select>
        </div>
        <div class="form-group">
          <label>도착 도시</label>
          <select id="tripTo">
            <option value="">-- 선택하세요 --</option>
            <option value="NRT">도쿄 (나리타 - NRT)</option>
            <option value="HND">도쿄 (하네다 - HND)</option>
            <option value="PEK">베이징 (PEK)</option>
            <option value="PVG">상하이 (푸둥 - PVG)</option>
            <option value="HKG">홍콩 (HKG)</option>
            <option value="SIN">싱가포르 (창이 - SIN)</option>
            <option value="BKK">방콕 (수완나품 - BKK)</option>
            <option value="LAX">로스앤젤레스 (LAX)</option>
            <option value="JFK">뉴욕 (JFK)</option>
            <option value="SFO">샌프란시스코 (SFO)</option>
            <option value="LHR">런던 (히드로 - LHR)</option>
            <option value="CDG">파리 (샤를드골 - CDG)</option>
            <option value="FRA">프랑크푸르트 (FRA)</option>
            <option value="DXB">두바이 (DXB)</option>
            <option value="SYD">시드니 (SYD)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>출발일</label>
          <input type="date" id="tripDate">
        </div>
        <div class="form-group">
          <label>귀국일</label>
          <input type="date" id="tripReturn">
        </div>
        <div class="form-group" style="justify-content:flex-end;">
          <button class="btn" onclick="searchTrip()">노선 및 호텔 검색</button>
        </div>
      </div>
    </div>

    <div id="tripResults" style="display:none;">
      <div class="card">
        <div class="trip-section">
          <h3>추천 항공 노선</h3>
          <div id="routeResults"></div>
        </div>
      </div>

      <div class="card">
        <div class="trip-section">
          <h3>추천 호텔</h3>
          <div id="hotelResults"></div>
        </div>
      </div>

      <div class="card">
        <div class="trip-section">
          <h3>공항에서 호텔까지 동선</h3>
          <div id="map"></div>
          <div class="route-summary" id="routeSummary" style="display:none;"></div>
        </div>
      </div>

      <div style="text-align:center; margin-bottom:2rem;">
        <button class="btn btn-success" onclick="saveTripPlan()">출장 계획 저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 일정 모달 -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <h3 id="modalTitle">새 일정 등록</h3>
    <input type="hidden" id="editScheduleId">
    <div class="form-group">
      <label>임원</label>
      <select id="schedExec"></select>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="schedTitle" placeholder="일정 제목...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="schedDate">
      </div>
      <div class="form-group">
        <label>시간</label>
        <input type="time" id="schedTime">
      </div>
    </div>
    <div class="form-group">
      <label>종료일 (여러 날 일정 시)</label>
      <input type="date" id="schedEndDate">
    </div>
    <div class="form-group">
      <label>장소</label>
      <input type="text" id="schedLocation" placeholder="장소...">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="schedNotes" rows="3" placeholder="추가 메모..."></textarea>
    </div>
    <div class="form-group">
      <label>유형</label>
      <select id="schedType">
        <option value="meeting">회의</option>
        <option value="trip">출장</option>
        <option value="conference">컨퍼런스</option>
        <option value="dinner">비즈니스 식사</option>
        <option value="other">기타</option>
      </select>
    </div>
    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
      <button class="btn" onclick="saveSchedule()">저장</button>
      <button class="btn btn-outline" onclick="closeScheduleModal()">취소</button>
    </div>
  </div>
</div>

<script>
// ========== 전역 상태 ==========
let executives = JSON.parse(localStorage.getItem('sec_executives') || '["김 회장","박 대표","이 전무","최 상무"]');
let schedules = JSON.parse(localStorage.getItem('sec_schedules') || '[]');
let tripPlans = JSON.parse(localStorage.getItem('sec_trips') || '[]');
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selectedRoute = null;
let selectedHotel = null;

const TYPE_LABELS = { meeting:'회의', trip:'출장', conference:'컨퍼런스', dinner:'비즈니스 식사', other:'기타' };

// ========== 시계 ==========
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
}
updateClock();
setInterval(updateClock, 1000);

function updateGreeting() {
  const h = new Date().getHours();
  let msg;
  if (h < 6) msg = '늦은 시간까지 수고 많으십니다. 충분히 쉬세요.';
  else if (h < 9) msg = '좋은 아침입니다! 오늘의 임원 일정을 확인해 보세요.';
  else if (h < 12) msg = '오전 업무 중입니다. 준비할 회의가 있는지 확인하세요.';
  else if (h < 14) msg = '점심 시간입니다. 오후 일정도 미리 확인해 두세요.';
  else if (h < 18) msg = '오후 업무 중입니다. 남은 일정을 잘 마무리하세요!';
  else msg = '수고하셨습니다. 내일 일정을 미리 확인해 보세요.';
  document.getElementById('greeting').textContent = msg;
}
updateGreeting();

// ========== 탭 ==========
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

// ========== 일정 관리 ==========
function saveSchedules() { localStorage.setItem('sec_schedules', JSON.stringify(schedules)); }

function openScheduleModal(editId) {
  const modal = document.getElementById('scheduleModal');
  if (editId !== undefined) {
    const s = schedules.find(x => x.id === editId);
    if (!s) return;
    document.getElementById('modalTitle').textContent = '일정 수정';
    document.getElementById('editScheduleId').value = editId;
    document.getElementById('schedExec').value = s.exec;
    document.getElementById('schedTitle').value = s.title;
    document.getElementById('schedDate').value = s.date;
    document.getElementById('schedTime').value = s.time || '';
    document.getElementById('schedEndDate').value = s.endDate || '';
    document.getElementById('schedLocation').value = s.location || '';
    document.getElementById('schedNotes').value = s.notes || '';
    document.getElementById('schedType').value = s.type || 'meeting';
  } else {
    document.getElementById('modalTitle').textContent = '새 일정 등록';
    document.getElementById('editScheduleId').value = '';
    document.getElementById('schedTitle').value = '';
    document.getElementById('schedDate').value = '';
    document.getElementById('schedTime').value = '';
    document.getElementById('schedEndDate').value = '';
    document.getElementById('schedLocation').value = '';
    document.getElementById('schedNotes').value = '';
    document.getElementById('schedType').value = 'meeting';
  }
  modal.classList.add('show');
}

function closeScheduleModal() {
  document.getElementById('scheduleModal').classList.remove('show');
}

function saveSchedule() {
  const title = document.getElementById('schedTitle').value.trim();
  const date = document.getElementById('schedDate').value;
  if (!title || !date) { alert('제목과 날짜를 입력해 주세요.'); return; }
  const editId = document.getElementById('editScheduleId').value;
  const data = {
    id: editId ? Number(editId) : Date.now(),
    exec: document.getElementById('schedExec').value,
    title,
    date,
    time: document.getElementById('schedTime').value,
    endDate: document.getElementById('schedEndDate').value,
    location: document.getElementById('schedLocation').value,
    notes: document.getElementById('schedNotes').value,
    type: document.getElementById('schedType').value
  };
  if (editId) {
    const idx = schedules.findIndex(s => s.id === Number(editId));
    if (idx >= 0) schedules[idx] = data;
  } else {
    schedules.push(data);
  }
  saveSchedules();
  closeScheduleModal();
  renderCalendar();
  renderScheduleList();
  renderDashboard();
}

function deleteSchedule(id) {
  if (!confirm('이 일정을 삭제하시겠습니까?')) return;
  schedules = schedules.filter(s => s.id !== id);
  saveSchedules();
  renderCalendar();
  renderScheduleList();
  renderDashboard();
}

function renderScheduleList() {
  const filter = document.getElementById('filterExec').value;
  const list = document.getElementById('scheduleList');
  let filtered = schedules
    .filter(s => filter === 'all' || s.exec === filter)
    .sort((a, b) => a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || ''));

  const today = new Date().toISOString().slice(0, 10);
  filtered = filtered.filter(s => s.date >= today);

  if (filtered.length === 0) {
    list.innerHTML = '<li class="empty-state">예정된 일정이 없습니다.</li>';
    return;
  }
  list.innerHTML = filtered.map(s => {
    const d = new Date(s.date + 'T00:00:00');
    return `
      <li class="schedule-item">
        <div class="schedule-date-badge">
          <div class="day">${d.getDate()}</div>
          <div class="month">${d.toLocaleDateString('ko',{month:'short'})}</div>
        </div>
        <div class="schedule-info">
          <div class="title">${esc(s.title)}</div>
          <div class="time">${s.time || '종일'}${s.endDate ? ' ~ ' + s.endDate : ''}</div>
          ${s.location ? `<div class="detail">${esc(s.location)}</div>` : ''}
          ${s.notes ? `<div class="detail">${esc(s.notes)}</div>` : ''}
          <span class="exec-tag">${esc(s.exec)}</span>
          <span class="exec-tag" style="background:#f0f0f0; color:#888;">${TYPE_LABELS[s.type] || s.type}</span>
        </div>
        <div class="schedule-actions">
          <button class="btn btn-sm btn-outline" onclick="openScheduleModal(${s.id})">수정</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})">삭제</button>
        </div>
      </li>
    `;
  }).join('');
}

// ========== 캘린더 ==========
function renderCalendar() {
  document.getElementById('calendarTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
  const grid = document.getElementById('calendarGrid');
  const days = ['일','월','화','수','목','금','토'];
  let html = days.map(d => `<div class="day-header">${d}</div>`).join('');

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);
  const scheduleDates = new Set(schedules.map(s => s.date));

  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="day-cell other-month">${prevDays - i}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = dateStr === todayStr;
    const hasEvent = scheduleDates.has(dateStr);
    html += `<div class="day-cell ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" onclick="showDaySchedules('${dateStr}')">${d}</div>`;
  }
  const remaining = 42 - (firstDay + daysInMonth);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="day-cell other-month">${d}</div>`;
  }
  grid.innerHTML = html;
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

function showDaySchedules(dateStr) {
  const daySchedules = schedules.filter(s => s.date === dateStr);
  if (daySchedules.length === 0) {
    document.getElementById('schedDate').value = dateStr;
    openScheduleModal();
    return;
  }
  document.getElementById('filterExec').value = 'all';
  document.getElementById('scheduleListTitle').textContent = `${dateStr} 일정`;
  const list = document.getElementById('scheduleList');
  const filtered = daySchedules.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  list.innerHTML = filtered.map(s => `
    <li class="schedule-item">
      <div class="schedule-date-badge">
        <div class="day">${new Date(s.date+'T00:00:00').getDate()}</div>
        <div class="month">${new Date(s.date+'T00:00:00').toLocaleDateString('ko',{month:'short'})}</div>
      </div>
      <div class="schedule-info">
        <div class="title">${esc(s.title)}</div>
        <div class="time">${s.time || '종일'}</div>
        ${s.location ? `<div class="detail">${esc(s.location)}</div>` : ''}
        <span class="exec-tag">${esc(s.exec)}</span>
      </div>
      <div class="schedule-actions">
        <button class="btn btn-sm btn-outline" onclick="openScheduleModal(${s.id})">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})">삭제</button>
      </div>
    </li>
  `).join('');
}

// ========== 대시보드 ==========
function renderDashboard() {
  const today = new Date().toISOString().slice(0, 10);
  const todayList = document.getElementById('todaySchedule');
  const todayItems = schedules.filter(s => s.date === today).sort((a, b) => (a.time||'').localeCompare(b.time||''));
  if (todayItems.length === 0) {
    todayList.innerHTML = '<li class="empty-state">오늘 예정된 일정이 없습니다.</li>';
  } else {
    todayList.innerHTML = todayItems.map(s => `
      <li class="schedule-item">
        <div class="schedule-date-badge" style="min-width:50px;">
          <div class="day" style="font-size:0.9rem;">${s.time || '종일'}</div>
        </div>
        <div class="schedule-info">
          <div class="title">${esc(s.title)}</div>
          ${s.location ? `<div class="detail">${esc(s.location)}</div>` : ''}
          <span class="exec-tag">${esc(s.exec)}</span>
        </div>
      </li>
    `).join('');
  }

  const tripList = document.getElementById('upcomingTrips');
  const upcoming = tripPlans.filter(t => t.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  if (upcoming.length === 0) {
    tripList.innerHTML = '<li class="empty-state">예정된 출장이 없습니다.</li>';
  } else {
    tripList.innerHTML = upcoming.map(t => `
      <li class="schedule-item">
        <div class="schedule-date-badge">
          <div class="day">${new Date(t.date+'T00:00:00').getDate()}</div>
          <div class="month">${new Date(t.date+'T00:00:00').toLocaleDateString('ko',{month:'short'})}</div>
        </div>
        <div class="schedule-info">
          <div class="title">${esc(t.exec)}: ${esc(t.fromName)} &#8594; ${esc(t.toName)}</div>
          <div class="time">${t.date} ~ ${t.returnDate || '미정'}</div>
          <div class="detail">노선: ${esc(t.route)}</div>
          <div class="detail">호텔: ${esc(t.hotel)}</div>
        </div>
        <div class="schedule-actions">
          <button class="btn btn-sm btn-danger" onclick="deleteTrip(${t.id})">삭제</button>
        </div>
      </li>
    `).join('');
  }
}

function deleteTrip(id) {
  if (!confirm('이 출장 계획을 삭제하시겠습니까?')) return;
  tripPlans = tripPlans.filter(t => t.id !== id);

}

function getLayoverKey(from, to) {
  const key = from + '-' + to;
  if (LAYOVERS[key]) return key;
  if (['GMP','PUS','CJU'].includes(from)) {
    const altKey = 'ICN-' + to;
    if (LAYOVERS[altKey]) return altKey;
  }
  return null;
}

// ========== 출장 검색 ==========
let map = null;

function populateTripExecs() {
  const sel = document.getElementById('tripExec');
  sel.innerHTML = executives.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
}

function searchTrip() {
  const from = document.getElementById('tripFrom').value;
  const to = document.getElementById('tripTo').value;
  if (!to) { alert('도착 도시를 선택해 주세요.'); return; }

  selectedRoute = null;
  selectedHotel = null;

  const routeDiv = document.getElementById('routeResults');
  const layoverKey = getLayoverKey(from, to);
  if (layoverKey && LAYOVERS[layoverKey]) {
    const routes = LAYOVERS[layoverKey];
    routeDiv.innerHTML = routes.map((r, i) => {
      const stopText = r.stops.length === 0 ? '직항' : `경유: ${r.stops.join(', ')}`;
      const tags = r.tags.map(t => {
        const cls = t === 'recommend' ? 'tag-recommend' : t === 'fastest' ? 'tag-fastest' : 'tag-cheapest';
        const label = t === 'recommend' ? '추천' : t === 'fastest' ? '최단시간' : '최저가';
        return `<span class="route-tag ${cls}">${label}</span>`;
      }).join('');
      return `
        <div class="route-card" onclick="selectRoute(${i})" id="route-${i}">
          <div class="route-title">${stopText} (${r.duration})</div>
          <div class="route-detail">${r.note}</div>
          ${tags}
        </div>
      `;
    }).join('');
  } else {
    routeDiv.innerHTML = `
      <div class="route-card">
        <div class="route-title">맞춤 노선</div>
        <div class="route-detail">${AIRPORTS[from]?.name || from}에서 ${AIRPORTS[to]?.name || to}까지의 사전 등록된 노선 정보가 없습니다. 항공사 웹사이트에서 확인해 주세요. 일반적인 경유지: 도쿄(NRT), 싱가포르(SIN), 두바이(DXB)</div>
      </div>
    `;
  }

  const hotelDiv = document.getElementById('hotelResults');
  const hotels = HOTELS[to];
  if (hotels) {
    hotelDiv.innerHTML = hotels.map((h, i) => `
      <div class="hotel-card" onclick="selectHotel(${i})" id="hotel-${i}">
        <div class="hotel-name">${h.name}</div>
        <div class="stars">${'&#9733;'.repeat(h.stars)}${'&#9734;'.repeat(5-h.stars)}</div>
        <div class="hotel-info">${h.area} | ${h.price} | ${h.note}</div>
      </div>
    `).join('');
  } else {
    hotelDiv.innerHTML = '<div class="empty-state">해당 도시의 호텔 정보가 없습니다.</div>';
  }

  document.getElementById('tripResults').style.display = 'block';

  setTimeout(() => {
    if (map) { map.remove(); map = null; }
    const airport = AIRPORTS[to];
    if (!airport) return;
    map = L.map('map').setView([airport.lat, airport.lng], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    L.marker([airport.lat, airport.lng])
      .addTo(map)
      .bindPopup(`<b>${airport.name}</b>`)
      .openPopup();

    if (hotels && hotels.length > 0) {
      hotels.forEach((h, i) => {
        L.marker([h.lat, h.lng], {
          icon: L.divIcon({
            className: '',
            html: `<div style="background:#667eea;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.3);">${i+1}</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
          })
        }).addTo(map).bindPopup(`<b>${h.name}</b><br>${h.area} | ${h.price}`);
      });
    }
  }, 100);

  document.getElementById('routeSummary').style.display = 'none';
}

function selectRoute(idx) {
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('route-' + idx).classList.add('selected');
  const to = document.getElementById('tripTo').value;
  const layoverKey = getLayoverKey(document.getElementById('tripFrom').value, to);
  selectedRoute = layoverKey ? LAYOVERS[layoverKey][idx] : null;
}

function selectHotel(idx) {
  document.querySelectorAll('.hotel-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('hotel-' + idx).classList.add('selected');
  const to = document.getElementById('tripTo').value;
  selectedHotel = HOTELS[to] ? HOTELS[to][idx] : null;

  if (!selectedHotel || !map) return;

  const airport = AIRPORTS[to];
  map.eachLayer(l => { if (l instanceof L.Polyline) map.removeLayer(l); });

  const routeLine = L.polyline(
    [[airport.lat, airport.lng], [selectedHotel.lat, selectedHotel.lng]],
    { color: '#667eea', weight: 4, dashArray: '10,8', opacity: 0.8 }
  ).addTo(map);

  map.fitBounds(routeLine.getBounds().pad(0.3));

  const summary = document.getElementById('routeSummary');
  const dist = getDistance(airport.lat, airport.lng, selectedHotel.lat, selectedHotel.lng);
  const taxiTime = Math.round(dist / 40 * 60);
  const taxiCost = estimateTaxiCost(to, dist);

  summary.style.display = 'block';
  summary.innerHTML = `
    <h4>동선: ${airport.name} &#8594; ${selectedHotel.name}</h4>
    <div style="margin-bottom:0.75rem; font-size:0.88rem; color:#555;">
      예상 거리: 약 ${dist.toFixed(1)}km | 예상 소요 시간: 택시 기준 약 ${taxiTime}분
      ${taxiCost ? ` | 예상 비용: ${taxiCost}` : ''}
    </div>
    <div class="route-step">
      <div class="step-num">1</div>
      <div class="step-text"><strong>도착</strong> - ${airport.name}에 도착합니다. 입국 심사 후 수하물을 수령합니다.</div>
    </div>
    <div class="route-step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>교통수단</strong> - ${getTransportAdvice(to, dist)}</div>
    </div>
    <div class="route-step">
      <div class="step-num">3</div>
      <div class="step-text"><strong>이동 중</strong> - ${selectedHotel.area} 방면으로 이동합니다. 예상 소요 시간 약 ${taxiTime}분${dist > 30 ? ' (출퇴근 시간대에는 15~30분 추가 소요 가능)' : ''}.</div>
    </div>
    <div class="route-step">
      <div class="step-num">4</div>
      <div class="step-text"><strong>호텔 도착</strong> - ${selectedHotel.name} (${selectedHotel.area})에 도착합니다. 체크인 후 짐을 정리합니다.</div>
    </div>
  `;
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI / 180;
  const dLng = (lng2-lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function estimateTaxiCost(airport, dist) {
  const costs = {
    NRT: `약 ${Math.round(dist*400).toLocaleString()}엔 (약 ${Math.round(dist*3600).toLocaleString()}원)`,
    HND: `약 ${Math.round(dist*400).toLocaleString()}엔 (약 ${Math.round(dist*3600).toLocaleString()}원)`,
    PEK: `약 ${Math.round(dist*3)}위안 (약 ${Math.round(dist*580).toLocaleString()}원)`,
    PVG: `약 ${Math.round(dist*3)}위안 (약 ${Math.round(dist*580).toLocaleString()}원)`,
    HKG: `약 ${Math.round(dist*10)}홍콩달러 (약 ${Math.round(dist*1750).toLocaleString()}원)`,
    SIN: `약 ${Math.round(dist*1.2)}싱가포르달러 (약 ${Math.round(dist*1200).toLocaleString()}원)`,
    BKK: `약 ${Math.round(dist*15)}바트 (약 ${Math.round(dist*580).toLocaleString()}원)`,
    LAX: `약 $${Math.round(dist*2.5)} (약 ${Math.round(dist*3500).toLocaleString()}원)`,
    JFK: `약 $70 정액제 (맨해튼행, 약 98,000원)`,
    SFO: `약 $${Math.round(dist*3)} (약 ${Math.round(dist*4200).toLocaleString()}원)`,
    LHR: `약 ${Math.round(dist*3.5)}파운드 (약 ${Math.round(dist*6100).toLocaleString()}원)`,
    CDG: `약 ${Math.round(dist*2.5)}유로 (약 ${Math.round(dist*3800).toLocaleString()}원)`,
    FRA: `약 ${Math.round(dist*2.5)}유로 (약 ${Math.round(dist*3800).toLocaleString()}원)`,
    DXB: `약 ${Math.round(dist*3)}디르함 (약 ${Math.round(dist*1100).toLocaleString()}원)`,
    SYD: `약 $${Math.round(dist*3)}호주달러 (약 ${Math.round(dist*2700).toLocaleString()}원)`,
  };
  return costs[airport] || '';
}

  return advice[airport] || `공항에서 ${AIRPORTS[airport]?.city || '시내'}까지 택시 또는 차량 호출을 이용하세요. 예상 거리: ${dist.toFixed(1)}km.`;
}

function saveTripPlan() {
  const exec = document.getElementById('tripExec').value;
  const from = document.getElementById('tripFrom').value;
  const to = document.getElementById('tripTo').value;
  const date = document.getElementById('tripDate').value;
  const returnDate = document.getElementById('tripReturn').value;
  if (!to || !date) { alert('도착 도시와 출발일을 입력해 주세요.'); return; }

  const plan = {
    id: Date.now(),
    exec,
    from,
    to,
    fromName: AIRPORTS[from]?.city || from,
    toName: AIRPORTS[to]?.city || to,
    date,
    returnDate,
    route: selectedRoute ? (selectedRoute.stops.length === 0 ? '직항' : `경유: ${selectedRoute.stops.join(', ')}`) + ` (${selectedRoute.duration})` : '미정',
    hotel: selectedHotel ? selectedHotel.name : '미정'
  };

  tripPlans.push(plan);
  localStorage.setItem('sec_trips', JSON.stringify(tripPlans));

  schedules.push({
    id: Date.now() + 1,
    exec,
    title: `해외 출장: ${AIRPORTS[to]?.city || to}`,
    date,
    time: '',
    endDate: returnDate,
    location: `${AIRPORTS[from]?.city || from} -> ${AIRPORTS[to]?.city || to}`,
    notes: `노선: ${plan.route} | 호텔: ${plan.hotel}`,
    type: 'trip'
  });
  saveSchedules();

  alert('출장 계획이 저장되었습니다! 일정에도 자동 등록되었습니다.');
  renderDashboard();
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

renderExecChips();
renderCalendar();
renderScheduleList();
